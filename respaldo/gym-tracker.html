<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Gym Tracker · Juan</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f0f;--s1:#161616;--s2:#1c1c1c;--s3:#222;
  --b1:#222;--b2:#2e2e2e;--b3:#3a3a3a;
  --text:#f0ede8;--muted:#777;--dim:#444;--dimmer:#333;
  --green:#a3e635;--green-dim:#6a9d20;--green-bg:rgba(163,230,53,.07);
  --red:#f87171;--radius:10px;
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.5;min-height:100vh;overflow-x:hidden}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{appearance:none;-moz-appearance:textfield}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:#111}
::-webkit-scrollbar-thumb{background:#333;border-radius:2px}

.app{max-width:480px;margin:0 auto;padding:20px 16px 100px}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.logo{font-family:monospace;font-size:11px;color:var(--dim);letter-spacing:.08em;text-transform:uppercase}
.logo b{color:var(--green);font-weight:500}
.week-tag{font-family:monospace;font-size:11px;color:var(--dim);background:var(--s1);border:.5px solid var(--b1);padding:4px 10px;border-radius:20px}

/* Nav */
.nav{display:flex;gap:5px;margin-bottom:20px}
.nav-btn{flex:1;background:transparent;border:.5px solid var(--b1);color:var(--muted);font-size:13px;font-family:inherit;padding:9px 4px;border-radius:var(--radius);cursor:pointer;transition:all .15s}
.nav-btn.active{border-color:var(--green);color:var(--green);background:var(--green-bg)}
.page{display:none}
.page.active{display:block}

/* Day grid */
.day-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px}
.day-btn{background:var(--s1);border:.5px solid var(--b1);border-radius:var(--radius);padding:15px 8px;text-align:center;cursor:pointer;position:relative;transition:all .15s;-webkit-user-select:none;user-select:none}
.day-btn.active{border-color:var(--green);background:var(--green-bg)}
.day-btn .dname{font-size:14px;font-weight:500;margin-bottom:2px;color:var(--text)}
.day-btn.active .dname{color:var(--green)}
.day-btn .dcode{font-family:monospace;font-size:10px;color:var(--dim);text-transform:uppercase}
.day-dot{width:6px;height:6px;border-radius:50%;background:var(--green);position:absolute;top:8px;right:8px;display:none}
.day-btn.done .day-dot{display:block}

/* Session header */
.sess-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sess-title{font-size:16px;font-weight:600}
.sess-date{font-family:monospace;font-size:11px;color:var(--muted);margin-top:1px}
.btn-sm{background:transparent;border:.5px solid var(--b2);color:var(--muted);font-size:12px;font-family:inherit;padding:6px 13px;border-radius:20px;cursor:pointer}

/* Exercise card */
.ex-card{background:var(--s1);border:.5px solid var(--b1);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;transition:border-color .15s}
.ex-card.open{border-color:var(--b2)}
.ex-hdr{display:flex;align-items:center;gap:8px;padding:12px 13px;cursor:pointer;-webkit-user-select:none;user-select:none}
.ex-num{font-family:monospace;font-size:10px;color:var(--dimmer);width:18px;flex-shrink:0}
.ex-name{flex:1;font-size:13px;font-weight:500;transition:color .1s}
.ex-card.open .ex-name{color:var(--green)}
.ex-badge{font-family:monospace;font-size:12px;padding:4px 9px;border-radius:5px;font-weight:600}
.ex-badge.tag{color:#ccc;background:#2a2a2a;border:1px solid #3a3a3a}
.ex-badge.cnt{color:var(--green);background:var(--green-bg)}
.ex-badge.prev{color:var(--green-dim)}
.ex-chev{color:var(--dim);font-size:14px;transition:transform .15s;flex-shrink:0}
.ex-card.open .ex-chev{transform:rotate(90deg)}

/* Set area */
.set-area{display:none;padding:0 10px 14px}
.ex-card.open .set-area{display:block}
.set-cols{display:flex;gap:8px;margin-bottom:6px;padding-left:28px}
.set-col-lbl{font-family:monospace;font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.05em;text-align:center;font-weight:500;width:80px}
.set-col-lbl.rir-lbl{width:60px}
.set-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.set-idx{font-family:monospace;font-size:12px;color:#666;width:20px;flex-shrink:0;text-align:right}
.set-inp{background:#252525;border:1.5px solid #555;color:#fff;font-family:monospace;font-size:17px;font-weight:600;width:80px;padding:10px 6px;border-radius:9px;text-align:center;outline:none;transition:border-color .15s,background .15s;appearance:none;-webkit-appearance:none}
.set-inp:focus{border-color:var(--green);background:#2c2c2c}
.set-inp.rir{width:60px;font-size:15px;border-color:#444}
.set-inp::placeholder{color:#555;font-size:13px}
.del-btn{background:transparent;border:none;color:#555;font-size:20px;cursor:pointer;padding:0 4px;line-height:1;flex-shrink:0}
.del-btn:active{color:var(--red)}
.add-set-btn{background:transparent;border:1px dashed #383838;color:#777;font-size:13px;font-family:inherit;padding:8px 14px;border-radius:8px;cursor:pointer;margin-top:2px;margin-left:28px}
.prev-hint{margin-top:10px;margin-left:28px;font-family:monospace;font-size:11px;color:#555}
.prev-hint b{color:#666}
.rir-hint{margin-top:3px;margin-bottom:12px;font-family:monospace;font-size:10px;color:#555;letter-spacing:.03em}

/* Save bar */
.save-bar{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(to top,#0f0f0f 65%,transparent);padding:18px 16px 28px;display:none}
.save-bar.show{display:block}
.save-btn{width:100%;max-width:480px;display:block;margin:0 auto;background:var(--green);color:#000;font-family:inherit;font-size:15px;font-weight:600;padding:14px;border:none;border-radius:var(--radius);cursor:pointer;letter-spacing:.01em}
.save-btn:active{opacity:.8;transform:scale(.99)}

/* Toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--green);color:#000;font-family:monospace;font-size:12px;padding:9px 20px;border-radius:20px;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Progress */
.sel-ex{background:var(--s1);border:.5px solid var(--b2);color:var(--text);font-family:inherit;font-size:14px;padding:9px 12px;border-radius:9px;outline:none;width:100%;margin-bottom:16px;-webkit-appearance:none;appearance:none}
.chart-box{background:var(--s1);border:.5px solid var(--b1);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.chart-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.chart-name{font-size:14px;font-weight:500;margin-bottom:2px}
.chart-sub{font-family:monospace;font-size:11px;color:var(--muted)}
.chart-val{font-family:monospace;font-size:24px;font-weight:500;text-align:right}
.chart-delta{font-family:monospace;font-size:12px;text-align:right}
.chart-svg{width:100%;overflow:visible}
.recent-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
.r-pill{background:var(--s2);border:.5px solid var(--b2);border-radius:6px;padding:5px 10px;font-family:monospace;font-size:11px}
.r-pill .rp-date{color:var(--dim);margin-bottom:1px;font-size:10px}
.r-pill.best-pill{border-color:var(--green-dim)}
.r-pill.best-pill .rp-kg{color:var(--green)}
.rp-kg{color:var(--text)}

/* History */
.hist-sess{margin-bottom:22px}
.hist-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.hist-label{font-family:monospace;font-size:11px;color:var(--muted)}
.hist-line{flex:1;height:.5px;background:var(--b1)}
.hist-del{background:transparent;border:none;color:var(--dimmer);font-size:12px;font-family:inherit;cursor:pointer}
.hist-ex{margin-bottom:9px}
.hist-ex-name{font-size:12px;font-weight:500;color:#999;margin-bottom:4px}
.hist-sets{display:flex;flex-wrap:wrap;gap:4px}
.h-pill{font-family:monospace;font-size:11px;background:var(--s2);border:.5px solid var(--b1);color:var(--dim);padding:3px 9px;border-radius:4px}
.h-pill.best{background:rgba(163,230,53,.06);border-color:var(--green-dim);color:var(--green)}

.empty{font-family:monospace;font-size:12px;color:var(--dimmer);text-align:center;padding:40px 0}
.no-day{font-family:monospace;font-size:12px;color:var(--dimmer);text-align:center;padding:36px 0}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="logo">JUAN · <b>GYM TRACKER</b></div>
    <div class="week-tag" id="weekTag"></div>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="showPage('train',this)">Entrenar</button>
    <button class="nav-btn" onclick="showPage('progress',this)">Progresión</button>
    <button class="nav-btn" onclick="showPage('history',this)">Historial</button>
  </div>

  <!-- TRAIN -->
  <div class="page active" id="page-train">
    <div class="day-grid" id="dayGrid"></div>
    <div id="sessionWrap"></div>
  </div>

  <!-- PROGRESS -->
  <div class="page" id="page-progress">
    <select class="sel-ex" id="exSelect" onchange="renderChart()"></select>
    <div id="chartArea"></div>
  </div>

  <!-- HISTORY -->
  <div class="page" id="page-history">
    <div id="histList"></div>
  </div>
</div>

<div class="save-bar" id="saveBar">
  <button class="save-btn" onclick="saveSession()">Guardar sesión →</button>
</div>
<div class="toast" id="toast"></div>

<script>
const DAYS = {
  lunes:{label:'Lunes',code:'D1',exs:[
    {name:'Sentadilla con barra',sets:4,tag:'4×6-10'},
    {name:'Press banca con barra',sets:4,tag:'4×6-10'},
    {name:'Jalón al pecho / Dominadas',sets:3,tag:'3×8-12'},
    {name:'Remo con barra',sets:3,tag:'3×8-12'},
    {name:'Elevaciones laterales',sets:3,tag:'3×12-15'},
    {name:'Curl de bíceps',sets:2,tag:'2×10-12'},
  ]},
  miercoles:{label:'Miércoles',code:'D2',exs:[
    {name:'Prensa de piernas',sets:4,tag:'4×8-12'},
    {name:'Press inclinado mancuernas',sets:3,tag:'3×8-12'},
    {name:'Hip thrust',sets:3,tag:'3×8-12'},
    {name:'Remo en polea baja',sets:3,tag:'3×10-12'},
    {name:'Fondos en paralelas',sets:3,tag:'3×6-10'},
    {name:'Face pulls / Rear delt',sets:2,tag:'2×15-20'},
    {name:'Gemelos',sets:3,tag:'3×15-20'},
  ]},
  viernes:{label:'Viernes',code:'D3',exs:[
    {name:'Peso muerto rumano',sets:3,tag:'3×8-10'},
    {name:'Press banca / Fondos',sets:3,tag:'3×6-10'},
    {name:'Jalón al pecho',sets:3,tag:'3×8-12'},
    {name:'Remo con barra / T-Bar',sets:3,tag:'3×8-12'},
    {name:'Elevaciones laterales',sets:3,tag:'3×12-15'},
    {name:'Curl martillo',sets:2,tag:'2×10-12'},
    {name:'Face pulls / Rear delt',sets:2,tag:'2×15-20'},
  ]}
};

const ALL_EX = [...new Set(Object.values(DAYS).flatMap(d=>d.exs.map(e=>e.name)))];

let currentDay = null;
let sessionData = {}; // {dayKey: [{name, sets:[{kg,reps,rir}]}]}
let sessions = [];
let openCards = {};

try { sessions = JSON.parse(localStorage.getItem('gymSessions_v3')||'[]'); } catch(e){}

function save(){ try{ localStorage.setItem('gymSessions_v3',JSON.stringify(sessions)); }catch(e){} }

function getWeek(){
  const d=new Date(),j=new Date(d.getFullYear(),0,4);
  return Math.ceil(((d-j)/86400000+j.getDay()+1)/7);
}
function todayStr(){
  return new Date().toLocaleDateString('es-UY',{day:'2-digit',month:'2-digit',year:'numeric'});
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ── PAGE NAV ──────────────────────────────────────────────────────
function showPage(name, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  document.getElementById('saveBar').classList.toggle('show', name==='train' && currentDay!==null);
  if(name==='progress') initProgress();
  if(name==='history') renderHistory();
}

// ── DAY GRID ──────────────────────────────────────────────────────
function renderDayGrid(){
  document.getElementById('weekTag').textContent='Sem '+getWeek();
  const g=document.getElementById('dayGrid');
  g.innerHTML='';
  const w=getWeek();
  Object.keys(DAYS).forEach(key=>{
    const d=DAYS[key];
    const done=sessions.some(s=>s.day===key&&s.week===w);
    const active=currentDay===key;
    const btn=document.createElement('button');
    btn.className='day-btn'+(active?' active':'')+(done?' done':'');
    btn.innerHTML=`<div class="day-dot"></div><div class="dname">${d.label}</div><div class="dcode">${d.code}</div>`;
    btn.onclick=()=>selectDay(key);
    g.appendChild(btn);
  });
}

// ── SELECT DAY ────────────────────────────────────────────────────
function selectDay(key){
  currentDay=key;
  openCards={};
  if(!sessionData[key]){
    sessionData[key]=DAYS[key].exs.map(ex=>({
      name:ex.name,
      sets:Array.from({length:ex.sets},()=>({kg:'',reps:'',rir:''}))
    }));
  }
  renderDayGrid();
  renderSession();
  document.getElementById('saveBar').classList.add('show');
}

// ── SESSION ───────────────────────────────────────────────────────
function renderSession(){
  const wrap=document.getElementById('sessionWrap');
  if(!currentDay||!sessionData[currentDay]){ wrap.innerHTML='<div class="no-day">Elegí el día para empezar</div>'; return; }
  const d=DAYS[currentDay];
  let html=`
    <div class="sess-hdr">
      <div><div class="sess-title">${d.label}</div><div class="sess-date">${todayStr()}</div></div>
      <button class="btn-sm" onclick="closeDay()">Cerrar</button>
    </div>
    <div class="rir-hint">RIR = reps en reserva · objetivo: 1–2</div>`;

  sessionData[currentDay].forEach((ex,ei)=>{
    const exDef=d.exs[ei];
    const filled=ex.sets.filter(s=>s.kg&&s.reps).length;
    const prev=getPrevBest(ex.name);
    const isOpen=!!openCards[ei];

    let setsHtml='';
    ex.sets.forEach((s,si)=>{
      setsHtml+=`<div class="set-row">
        <span class="set-idx">${si+1}</span>
        <input class="set-inp" type="number" step="0.5" min="0" placeholder="kg" value="${s.kg}" oninput="updSet(${ei},${si},'kg',this.value)" inputmode="decimal">
        <input class="set-inp" type="number" min="0" max="50" placeholder="rep" value="${s.reps}" oninput="updSet(${ei},${si},'reps',this.value)" inputmode="numeric">
        <input class="set-inp rir" type="number" min="0" max="5" placeholder="RIR" value="${s.rir}" oninput="updSet(${ei},${si},'rir',this.value)" inputmode="numeric">
        ${ex.sets.length>1?`<button class="del-btn" onclick="delSet(${ei},${si})">×</button>`:'<span style="width:28px"></span>'}
      </div>`;
    });

    html+=`<div class="ex-card${isOpen?' open':''}" id="exc-${ei}">
      <div class="ex-hdr" onclick="toggleCard(${ei})">
        <span class="ex-num">${String(ei+1).padStart(2,'0')}</span>
        <span class="ex-name">${ex.name}</span>
        ${filled>0?`<span class="ex-badge cnt">${filled}/${ex.sets.length}</span>`:''}
        <span class="ex-badge tag">${exDef.tag}</span>
        ${prev&&!isOpen?`<span class="ex-badge prev">${prev}</span>`:''}
        <span class="ex-chev">›</span>
      </div>
      <div class="set-area">
        <div class="set-cols">
          <div class="set-col-lbl">kg</div>
          <div class="set-col-lbl">reps</div>
          <div class="set-col-lbl rir-lbl">RIR</div>
        </div>
        ${setsHtml}
        <button class="add-set-btn" onclick="addSet(${ei})">+ serie</button>
        ${prev?`<div class="prev-hint"><b>Anterior:</b> ${prev}</div>`:''}
      </div>
    </div>`;
  });

  wrap.innerHTML=html;
}

function closeDay(){
  currentDay=null;
  document.getElementById('saveBar').classList.remove('show');
  renderDayGrid();
  document.getElementById('sessionWrap').innerHTML='<div class="no-day">Elegí el día para empezar</div>';
}

function toggleCard(ei){
  openCards[ei]=!openCards[ei];
  const card=document.getElementById('exc-'+ei);
  if(!card) return;
  card.classList.toggle('open',!!openCards[ei]);
  const prevBadge=card.querySelector('.ex-badge.prev');
  if(prevBadge) prevBadge.style.display=openCards[ei]?'none':'';
}

function updSet(ei,si,field,val){
  sessionData[currentDay][ei].sets[si][field]=val;
}

function addSet(ei){
  // flush all current input values before re-render
  flushInputs();
  sessionData[currentDay][ei].sets.push({kg:'',reps:'',rir:''});
  openCards[ei]=true;
  renderSession();
}

function delSet(ei,si){
  if(sessionData[currentDay][ei].sets.length<=1) return;
  flushInputs();
  sessionData[currentDay][ei].sets.splice(si,1);
  openCards[ei]=true;
  renderSession();
}

function flushInputs(){
  if(!currentDay||!sessionData[currentDay]) return;
  sessionData[currentDay].forEach((ex,ei)=>{
    ex.sets.forEach((s,si)=>{
      const card=document.getElementById('exc-'+ei);
      if(!card) return;
      const inputs=card.querySelectorAll('.set-area .set-row');
      if(!inputs[si]) return;
      const inps=inputs[si].querySelectorAll('input');
      if(inps[0]) s.kg=inps[0].value;
      if(inps[1]) s.reps=inps[1].value;
      if(inps[2]) s.rir=inps[2].value;
    });
  });
}

function saveSession(){
  flushInputs();
  const exs=(sessionData[currentDay]||[])
    .map(ex=>({...ex,sets:ex.sets.filter(s=>s.kg||s.reps)}))
    .filter(ex=>ex.sets.length);
  if(!exs.length){ showToast('No hay datos para guardar'); return; }
  sessions.unshift({
    day:currentDay,dayLabel:DAYS[currentDay].label,
    date:todayStr(),week:getWeek(),
    savedAt:new Date().toISOString(),exercises:exs
  });
  save();
  delete sessionData[currentDay];
  currentDay=null;
  openCards={};
  document.getElementById('saveBar').classList.remove('show');
  renderDayGrid();
  document.getElementById('sessionWrap').innerHTML='<div class="no-day">Sesión guardada ✓ — elegí el próximo día</div>';
  showToast('Sesión guardada ✓');
}

function getPrevBest(exName){
  const rel=sessions.filter(s=>s.exercises?.some(e=>e.name===exName))
    .sort((a,b)=>new Date(b.savedAt)-new Date(a.savedAt));
  if(!rel.length) return null;
  const ex=rel[0].exercises.find(e=>e.name===exName);
  const best=[...(ex?.sets||[])].filter(s=>s.kg&&s.reps).sort((a,b)=>parseFloat(b.kg)-parseFloat(a.kg))[0];
  return best?`${best.kg}kg×${best.reps}`:null;
}

// ── PROGRESS ─────────────────────────────────────────────────────
function initProgress(){
  const sel=document.getElementById('exSelect');
  sel.innerHTML='';
  ALL_EX.forEach(n=>{
    const o=document.createElement('option');
    o.value=n;o.textContent=n;sel.appendChild(o);
  });
  renderChart();
}

function renderChart(){
  const name=document.getElementById('exSelect').value;
  const area=document.getElementById('chartArea');
  const data=sessions
    .filter(s=>s.exercises?.some(e=>e.name===name))
    .map(s=>{
      const ex=s.exercises.find(e=>e.name===name);
      const best=[...(ex?.sets||[])].filter(x=>x.kg&&x.reps).sort((a,b)=>parseFloat(b.kg)-parseFloat(a.kg))[0];
      return{date:s.date,kg:best?parseFloat(best.kg):0,reps:best?parseInt(best.reps):0};
    }).filter(d=>d.kg>0).reverse();

  if(!data.length){
    area.innerHTML=`<div class="chart-box"><div class="chart-name">${name}</div><div class="empty" style="padding:24px 0">Sin datos aún — guardá sesiones primero</div></div>`;
    return;
  }

  const last=data[data.length-1].kg, first=data[0].kg;
  const delta=(last-first).toFixed(1);
  const dcolor=parseFloat(delta)>=0?'#a3e635':'#f87171';
  const dstr=(parseFloat(delta)>=0?'+':'')+delta+' kg';

  let svgHtml='';
  if(data.length>=2){
    const W=360,H=80,pad=8;
    const vals=data.map(d=>d.kg);
    const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
    const pts=vals.map((v,i)=>({
      x:pad+(i/(vals.length-1))*(W-pad*2),
      y:H-pad-((v-mn)/rng)*(H-pad*2),
      d:data[i]
    }));
    const path='M'+pts.map(p=>`${p.x},${p.y}`).join(' L');
    const area2=`M${pts[0].x},${H} L${pts.map(p=>`${p.x},${p.y}`).join(' L')} L${pts[pts.length-1].x},${H} Z`;
    const dots=pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="3.5" fill="#a3e635" stroke="#161616" stroke-width="1.5"><title>${p.d.date}: ${p.d.kg}kg×${p.d.reps}</title></circle>`).join('');
    const labels=pts.map((p,i)=>{
      if(data.length>5&&i%Math.ceil(data.length/4)!==0&&i!==data.length-1) return '';
      return `<text x="${p.x}" y="${H+14}" text-anchor="middle" fill="#444" font-size="9" font-family="monospace">${p.d.date.slice(0,5)}</text>`;
    }).join('');
    svgHtml=`<svg class="chart-svg" viewBox="0 0 ${W} ${H+18}">
      <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#a3e635" stop-opacity=".12"/><stop offset="100%" stop-color="#a3e635" stop-opacity="0"/></linearGradient></defs>
      <path d="${area2}" fill="url(#g)"/>
      <path d="${path}" fill="none" stroke="#6a9d20" stroke-width="1.5" stroke-linejoin="round"/>
      ${dots}${labels}
    </svg>`;
  }

  const recent=data.slice(-5).reverse();
  const bestKg=Math.max(...recent.map(r=>r.kg));
  const pillsHtml=recent.map(r=>`
    <div class="r-pill ${r.kg===bestKg?'best-pill':''}">
      <div class="rp-date">${r.date.slice(0,5)}</div>
      <div class="rp-kg">${r.kg}kg×${r.reps}</div>
    </div>`).join('');

  area.innerHTML=`<div class="chart-box">
    <div class="chart-top">
      <div><div class="chart-name">${name}</div><div class="chart-sub">${data.length} sesión${data.length!==1?'es':''}</div></div>
      <div><div class="chart-val">${last} kg</div><div class="chart-delta" style="color:${dcolor}">${dstr}</div></div>
    </div>
    ${svgHtml}
    <div class="recent-pills">${pillsHtml}</div>
  </div>`;
}

// ── HISTORY ───────────────────────────────────────────────────────
function renderHistory(){
  const list=document.getElementById('histList');
  if(!sessions.length){ list.innerHTML='<div class="empty">No hay sesiones guardadas aún</div>'; return; }
  list.innerHTML=sessions.slice(0,50).map((s,si)=>{
    const exHtml=s.exercises.map(ex=>{
      const bestIdx=ex.sets.reduce((bi,ss,idx)=>parseFloat(ss.kg)>parseFloat(ex.sets[bi]?.kg||0)?idx:bi,0);
      const pills=ex.sets.map((set,i)=>`<span class="h-pill${i===bestIdx?' best':''}">${set.kg}kg×${set.reps}${set.rir?` r${set.rir}`:''}</span>`).join('');
      return `<div class="hist-ex"><div class="hist-ex-name">${ex.name}</div><div class="hist-sets">${pills}</div></div>`;
    }).join('');
    return `<div class="hist-sess">
      <div class="hist-hdr">
        <span class="hist-label">${s.dayLabel} — ${s.date}</span>
        <div class="hist-line"></div>
        <button class="hist-del" onclick="delSession(${si})">borrar</button>
      </div>
      ${exHtml}
    </div>`;
  }).join('');
}

function delSession(idx){
  if(!confirm('¿Borrar esta sesión?')) return;
  sessions.splice(idx,1);
  save();
  renderHistory();
  renderDayGrid();
}

// ── INIT ─────────────────────────────────────────────────────────
renderDayGrid();
document.getElementById('sessionWrap').innerHTML='<div class="no-day">Elegí el día para empezar</div>';
</script>
